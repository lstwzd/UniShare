mode: server
server_ip: 192.168.1.100
network:
  static_ip: ''
  port_range: 24800-24810
  mdns_service_name: unishare
  broadcast_interval: 3000
  stream_port: 24803
  transfer_port: 24804
security:
  tls_enabled: true
  cert_path: ''
  key_path: ''
  allow_local_only: true
input_share:
  enabled: true
  screen_layout:
  - name: main-pc
    position:
    - 0
    - 0
  - name: second-pc
    position:
    - 1
    - 0
  mouse_smooth: true
  keyboard_sync: true
usb_share:
  enabled: true
  shared_devices: []
  auto_connect: false
  shared_device_ids:
  - cb0204db-de6f-4e12-8505-a2c8cd6ede4c
screen_extend:
  enabled: true
  fps: 30
  quality: 80
  resolution:
  - 1920
  - 1080
  extend_direction: right
  auto_start: false
drag_share:
  enabled: true
  auto_accept: true
  save_path: ~/Downloads/UniShare
  show_notification: true
